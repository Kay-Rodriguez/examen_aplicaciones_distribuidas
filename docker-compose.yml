services:

  mysql:
    image: mysql:8.4
    container_name: examen-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123

    expose:
      - "3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -proot123 --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

    networks:
      red-examen:
        aliases:
          - mysql
          - examen-mysql


  mysql-loader:
    image: mysql:8.4
    container_name: examen-mysql-loader

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      MYSQL_PWD: root123

    volumes:
      - ./init.sql:/scripts/init.sql:ro

    command:
      - bash
      - -c
      - |
        set -e

        echo "Esperando conexión con MySQL..."

        until mysqladmin ping \
          -h examen-mysql \
          -uroot \
          -proot123 \
          --silent
        do
          echo "MySQL todavía no está disponible..."
          sleep 3
        done

        echo "Preparando copia temporal del script SQL..."

        sed -E \
          -e "s/'([0-9]{4})\/([0-9])\/([0-9])'/'\1-0\2-0\3'/g" \
          -e "s/'([0-9]{4})\/([0-9])\/([0-9]{2})'/'\1-0\2-\3'/g" \
          -e "s/'([0-9]{4})\/([0-9]{2})\/([0-9])'/'\1-\2-0\3'/g" \
          -e "s/'([0-9]{4})\/([0-9]{2})\/([0-9]{2})'/'\1-\2-\3'/g" \
          -e "s/'([0-9]):([0-9]{2})'/'0\1:\2:00'/g" \
          -e "s/'([0-9]{2}):([0-9]{2})'/'\1:\2:00'/g" \
          /scripts/init.sql > /tmp/init-compatible.sql

        echo "Eliminando base anterior si existe..."

        mysql \
          -h examen-mysql \
          -uroot \
          -e "DROP DATABASE IF EXISTS examenad;"

        echo "Cargando información en MySQL..."

        mysql \
          -h examen-mysql \
          -uroot \
          --default-character-set=utf8mb4 \
          < /tmp/init-compatible.sql

        echo "Verificando tabla cargada..."

        mysql \
          -h examen-mysql \
          -uroot \
          -e "USE examenad; SHOW TABLES; SELECT COUNT(*) AS total_registros FROM redes;"

        echo "Script SQL cargado correctamente."

    networks:
      - red-examen


  server1:
    build:
      context: ./springboot
      dockerfile: Dockerfile

    container_name: examen-server1
    restart: unless-stopped

    environment:
      SERVER_NAME: server1
      SPRING_DATASOURCE_URL: jdbc:mysql://examen-mysql:3306/examenad?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

    depends_on:
      mysql-loader:
        condition: service_completed_successfully

    networks:
      - red-examen


  server2:
    build:
      context: ./springboot
      dockerfile: Dockerfile

    container_name: examen-server2
    restart: unless-stopped

    environment:
      SERVER_NAME: server2
      SPRING_DATASOURCE_URL: jdbc:mysql://examen-mysql:3306/examenad?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

    depends_on:
      mysql-loader:
        condition: service_completed_successfully

    networks:
      - red-examen


  nginx:
    image: nginx:alpine
    container_name: examen-nginx
    restart: unless-stopped

    ports:
      - "8081:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - server1
      - server2

    networks:
      - red-examen


  mapreduce:
    image: python:3.12-alpine
    container_name: examen-mapreduce

    working_dir: /proyecto

    volumes:
      - ./:/proyecto

    depends_on:
      - nginx

    command:
      - sh
      - ejecutar_mapreduce.sh

    networks:
      - red-examen

    profiles:
      - procesamiento


networks:
  red-examen:
    driver: bridge


volumes:
  mysql_data: